<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>KFG Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#07090f; --s1:#0c0f1a; --s2:#111520; --s3:#161b28;
  --b1:#1c2333; --b2:#243044; --b3:#2e3d56;
  --accent:#e8d5b0; --gold:#c9a96e; --gold2:#f0c97a;
  --teal:#4ecdc4; --red:#ff4757;
  --text:#f0ece4; --soft:#8a9bb5; --muted:#4a566b;
  --syne:'Syne',sans-serif; --dm:'DM Sans',sans-serif;
  --r:14px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow-x:hidden}
body{font-family:var(--dm);background:var(--bg);color:var(--text);min-height:100vh}
body::before{content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 60% 40% at 10% 0%,rgba(78,205,196,.04) 0%,transparent 55%),
             radial-gradient(ellipse 50% 60% at 90% 100%,rgba(201,169,110,.04) 0%,transparent 55%);
  pointer-events:none;z-index:0}

/* ── NAV ── */
.nav{position:sticky;top:0;z-index:200;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;height:52px;
  background:rgba(7,9,15,.9);backdrop-filter:blur(24px);
  border-bottom:1px solid var(--b1)}
.nav-left{display:flex;align-items:center;gap:8px;min-width:0}
.nav-logo{font-family:var(--syne);font-weight:800;font-size:15px;color:var(--accent);white-space:nowrap;flex-shrink:0}
.nav-sep{color:var(--muted)}
.nav-project{font-size:13px;color:var(--soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:150px}
.nav-right{display:flex;gap:5px;flex-shrink:0}
.nbtn{display:flex;align-items:center;gap:4px;padding:6px 10px;border-radius:8px;border:1px solid var(--b2);background:var(--s2);color:var(--soft);font-size:12px;font-weight:600;font-family:var(--dm);cursor:pointer;transition:all .15s;white-space:nowrap}
.nbtn:hover{border-color:var(--b3);color:var(--text)}
.nbtn.gold{background:rgba(201,169,110,.1);border-color:rgba(201,169,110,.3);color:var(--gold)}
.nbtn.gold:hover{background:rgba(201,169,110,.2);color:var(--gold2)}

/* ── BREADCRUMB ── */
.breadcrumb{position:relative;z-index:1;display:flex;align-items:center;gap:2px;padding:8px 16px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--b1)}
.breadcrumb::-webkit-scrollbar{display:none}
.bc-item{display:flex;align-items:center;gap:3px;white-space:nowrap;font-size:12px;color:var(--soft);cursor:pointer;padding:3px 7px;border-radius:6px;transition:all .15s}
.bc-item:hover{background:var(--s2);color:var(--text)}
.bc-item.active{color:var(--accent);font-weight:600;cursor:default}
.bc-item.active:hover{background:transparent}
.bc-sep{color:var(--muted);font-size:13px;flex-shrink:0;opacity:.5}

/* ── TOOLBAR ── */
.toolbar{position:relative;z-index:1;display:flex;align-items:center;gap:8px;padding:10px 16px}
.item-count{font-size:12px;color:var(--muted);margin-right:auto}
.sel-pill{font-family:var(--syne);font-size:12px;font-weight:700;color:var(--gold);background:rgba(201,169,110,.1);border:1px solid rgba(201,169,110,.25);padding:4px 12px;border-radius:20px;display:none}
.sel-pill.show{display:block}

/* ── GRID ── */
.grid-wrap{position:relative;z-index:1;padding:4px 12px 100px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:6px}
@media(min-width:540px){.grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px}}
@media(min-width:900px){.grid{grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px}}

/* ── GRID ITEM ── */
.gi{position:relative;aspect-ratio:1/1;border-radius:12px;overflow:hidden;cursor:pointer;background:var(--s2);border:1px solid var(--b1);transition:transform .2s,border-color .2s,box-shadow .2s;animation:fadeIn .3s ease both}
.gi:hover{transform:scale(1.02);border-color:var(--b3);box-shadow:0 8px 24px rgba(0,0,0,.4)}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.gi img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s}
.gi:hover img{transform:scale(1.05)}

/* folder */
.gi.folder{aspect-ratio:unset;min-height:72px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;background:var(--s2);border:1px solid var(--b2);padding:12px 8px}
.gi.folder:hover{background:var(--s3);border-color:rgba(201,169,110,.4);box-shadow:0 0 20px rgba(201,169,110,.08)}
.fi{font-size:30px;line-height:1}
.fn{font-size:10px;font-weight:600;color:var(--soft);text-align:center;word-break:break-word;line-height:1.3;max-width:100%}
.gi.folder:hover .fn{color:var(--accent)}

/* video play overlay */
.play-badge{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
.play-badge svg{width:40px;height:40px;filter:drop-shadow(0 2px 12px rgba(0,0,0,.8))}

/* selected */
.gi.sel{border-color:var(--gold)!important;box-shadow:0 0 0 2px var(--gold)!important}
.gi.sel .gi-tick{opacity:1!important}
.gi-tick{position:absolute;top:7px;right:7px;width:22px;height:22px;background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#1a0e00;z-index:3;opacity:0;transition:opacity .15s;line-height:1}

/* hover overlay */
.gi-ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.88) 0%,rgba(0,0,0,.15) 55%,transparent 100%);opacity:0;transition:opacity .18s;display:flex;flex-direction:column;justify-content:flex-end;padding:8px}
.gi:hover .gi-ov{opacity:1}
.gi-ov-btns{display:flex;gap:4px;justify-content:flex-end;margin-bottom:5px}
.ob{width:28px;height:28px;border-radius:7px;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.1);backdrop-filter:blur(8px);color:white;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.ob:hover{background:rgba(255,255,255,.25)}
.ob.on{background:rgba(201,169,110,.35);border-color:rgba(201,169,110,.7)}
.gi-nm{font-size:10px;color:rgba(255,255,255,.55);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── BOTTOM BAR ── */
.bottom-bar{position:fixed;bottom:0;left:0;right:0;z-index:300;padding:10px 14px env(safe-area-inset-bottom);background:rgba(7,9,15,.96);backdrop-filter:blur(24px);border-top:1px solid var(--b2);transform:translateY(110%);transition:transform .3s cubic-bezier(.34,1.56,.64,1)}
.bottom-bar.open{transform:translateY(0)}
.bb{max-width:600px;margin:0 auto;display:flex;align-items:center;gap:6px}
.bb-info{flex:1;min-width:0}
.bb-n{font-family:var(--syne);font-size:20px;font-weight:800;color:var(--gold);line-height:1}
.bb-l{font-size:10px;color:var(--muted)}
.bbb{display:flex;align-items:center;gap:4px;padding:9px 13px;border-radius:10px;border:1px solid transparent;font-size:12px;font-weight:700;font-family:var(--dm);cursor:pointer;white-space:nowrap;transition:all .15s}
.bbb.dl{background:var(--gold);color:#1a0e00;border-color:var(--gold)}
.bbb.dl:hover{background:var(--gold2)}
.bbb.wa{background:rgba(37,211,102,.12);border-color:rgba(37,211,102,.3);color:#25d366}
.bbb.wa:hover{background:rgba(37,211,102,.22)}
.bbb.clr{background:var(--s3);border-color:var(--b2);color:var(--soft)}
.bbb.clr:hover{color:var(--red);border-color:rgba(255,71,87,.3)}

/* ── SCREENS ── */
.screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:55vh;gap:12px;color:var(--soft);text-align:center;position:relative;z-index:1;grid-column:1/-1}
.spinner{width:34px;height:34px;border:2px solid var(--b2);border-top-color:var(--teal);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ══════════════════════════════════
   LIGHTBOX
══════════════════════════════════ */
#lb{position:fixed;inset:0;z-index:1000;background:#000;display:none;flex-direction:column;overscroll-behavior:none;touch-action:none}
#lb.open{display:flex}

/* header */
.lbh{position:absolute;top:0;left:0;right:0;z-index:10;display:flex;align-items:flex-start;justify-content:space-between;padding:12px 14px;background:linear-gradient(to bottom,rgba(0,0,0,.85) 0%,transparent 100%);transition:opacity .3s}
.lbh.hide{opacity:0;pointer-events:none}
.lbh-info{min-width:0;padding-right:8px}
.lbh-name{font-size:13px;font-weight:600;color:var(--accent);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px}
.lbh-sub{font-size:11px;color:var(--muted);margin-top:2px}
.lbh-btns{display:flex;gap:5px;flex-shrink:0}
.lhb{width:36px;height:36px;border-radius:9px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.08);backdrop-filter:blur(10px);color:white;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;font-size:16px}
.lhb:hover{background:rgba(255,255,255,.2)}
.lhb.x{font-size:20px}

/* main viewer */
.lb-main{flex:1;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
.lb-canvas{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;transform-origin:center;transition:none;will-change:transform}
.lb-canvas img{max-width:100%;max-height:100%;object-fit:contain;user-select:none;pointer-events:none;border-radius:3px;display:block}
.lb-canvas iframe{width:min(900px,100%);aspect-ratio:16/9;border:none;border-radius:8px}

/* arrows */
.lb-arr{position:absolute;top:50%;transform:translateY(-50%);z-index:5;width:42px;height:42px;border-radius:12px;border:1px solid rgba(255,255,255,.14);background:rgba(0,0,0,.5);backdrop-filter:blur(10px);color:white;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;user-select:none}
.lb-arr:hover{background:rgba(255,255,255,.15)}
#lbPrev{left:10px} #lbNext{right:10px}
@media(max-width:500px){.lb-arr{display:none}}

/* floating action bar — shows on hover / tap */
.lb-fab{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:6px;opacity:0;pointer-events:none;transition:opacity .22s;white-space:nowrap}
.lb-fab.vis{opacity:1;pointer-events:all}
.lf{display:flex;align-items:center;gap:5px;padding:9px 15px;border-radius:40px;border:1px solid rgba(255,255,255,.18);background:rgba(0,0,0,.75);backdrop-filter:blur(20px);color:white;font-size:13px;font-weight:600;font-family:var(--dm);cursor:pointer;transition:all .15s}
.lf:hover{background:rgba(255,255,255,.12)}
.lf.sel{background:rgba(201,169,110,.18);border-color:rgba(201,169,110,.45);color:var(--gold)}
.lf.sel.on{background:rgba(201,169,110,.35);border-color:var(--gold)}
.lf.wa{color:#25d366;background:rgba(37,211,102,.12);border-color:rgba(37,211,102,.3)}
.lf.wa:hover{background:rgba(37,211,102,.22)}
.lf.dl{color:var(--gold2);background:rgba(240,201,122,.1);border-color:rgba(240,201,122,.3)}
@media(max-width:480px){.lf span{display:none}.lf{padding:9px 12px;gap:0}}

/* zoom badge */
.zbadge{position:absolute;top:14px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.7);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.1);color:white;font-size:11px;font-weight:700;padding:4px 11px;border-radius:20px;z-index:10;opacity:0;transition:opacity .3s;pointer-events:none}
.zbadge.show{opacity:1}

/* thumbnail strip */
.lb-strip-wrap{height:70px;background:rgba(0,0,0,.7);border-top:1px solid rgba(255,255,255,.05);flex-shrink:0}
.lb-strip{display:flex;gap:3px;padding:5px 8px;height:100%;overflow-x:auto;scroll-behavior:smooth;scrollbar-width:none;align-items:center}
.lb-strip::-webkit-scrollbar{display:none}
.lt{width:58px;height:58px;border-radius:6px;overflow:hidden;cursor:pointer;flex-shrink:0;border:2px solid transparent;transition:all .15s;opacity:.45;background:var(--s2);display:flex;align-items:center;justify-content:center}
.lt:hover{opacity:.75}
.lt.a{border-color:var(--gold);opacity:1}
.lt img{width:100%;height:100%;object-fit:cover;display:block}
.lt.vt,.lt.ot{font-size:20px}

/* ── TOAST ── */
.toast-wrap{position:fixed;top:58px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;align-items:center;gap:5px;pointer-events:none}
.toast{background:var(--s3);border:1px solid var(--b3);color:var(--text);padding:8px 18px;border-radius:40px;font-size:13px;font-weight:500;white-space:nowrap;box-shadow:0 6px 20px rgba(0,0,0,.5);animation:tIn .2s ease}
@keyframes tIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}

/* ── DL PROGRESS ── */
.dl-ov{position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,.87);display:none;align-items:center;justify-content:center}
.dl-ov.open{display:flex}
.dl-box{background:var(--s2);border:1px solid var(--b2);border-radius:20px;padding:30px 34px;text-align:center;min-width:240px}
.dl-icon{font-size:34px;margin-bottom:10px}
.dl-ttl{font-family:var(--syne);font-size:15px;font-weight:700;margin-bottom:14px;color:var(--accent)}
.dl-bg{background:var(--b1);border-radius:40px;height:5px;overflow:hidden;margin-bottom:9px}
.dl-bar{height:100%;background:var(--gold);border-radius:40px;width:0%;transition:width .3s}
.dl-inf{font-size:12px;color:var(--muted)}

@media(max-width:400px){
  .lb-strip-wrap{height:58px}
  .lt{width:46px;height:46px}
}
</style>
</head>
<body>

<div class="toast-wrap" id="toastWrap"></div>

<!-- DL OVERLAY -->
<div class="dl-ov" id="dlOv">
  <div class="dl-box">
    <div class="dl-icon">⬇️</div>
    <div class="dl-ttl">Mengunduh file...</div>
    <div class="dl-bg"><div class="dl-bar" id="dlBar"></div></div>
    <div class="dl-inf" id="dlInf">0 / 0</div>
  </div>
</div>

<!-- NAV -->
<nav class="nav">
  <div class="nav-left">
    <div class="nav-logo">KFG</div>
    <div class="nav-sep">/</div>
    <div class="nav-project" id="navProject">memuat...</div>
  </div>
  <div class="nav-right">
    <div class="sel-pill" id="selPill">0 dipilih</div>
    <button class="nbtn gold" id="dlSelBtn" onclick="downloadSelected()" style="display:none">⬇ Pilihan</button>
    <button class="nbtn" onclick="downloadAll()">⬇ Semua</button>
  </div>
</nav>

<!-- BREADCRUMB -->
<div class="breadcrumb" id="breadcrumb"></div>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="item-count" id="itemCount"></div>
</div>

<!-- GRID -->
<div class="grid-wrap">
  <div class="grid" id="grid">
    <div class="screen"><div class="spinner"></div><div style="font-size:13px;color:var(--muted)">Memuat folder...</div></div>
  </div>
</div>

<!-- BOTTOM BAR -->
<div class="bottom-bar" id="bb">
  <div class="bb">
    <div class="bb-info">
      <div class="bb-n" id="bbN">0</div>
      <div class="bb-l">foto dipilih</div>
    </div>
    <button class="bbb clr" onclick="clearSel()">✕</button>
    <button class="bbb wa" onclick="shareWA()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
      <span>WA</span>
    </button>
    <button class="bbb dl" onclick="downloadSelected()">⬇ Download</button>
  </div>
</div>

<!-- LIGHTBOX -->
<div id="lb">
  <!-- header -->
  <div class="lbh" id="lbH">
    <div class="lbh-info">
      <div class="lbh-name" id="lbName">-</div>
      <div class="lbh-sub" id="lbSub">-</div>
    </div>
    <div class="lbh-btns">
      <button class="lhb" onclick="lbDrive()" title="Buka di Drive">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      </button>
      <button class="lhb x" onclick="lbClose()">×</button>
    </div>
  </div>

  <!-- canvas -->
  <div class="lb-main" id="lbMain">
    <div class="lb-canvas" id="lbCanvas"></div>
    <button class="lb-arr" id="lbPrev" onclick="lbNav(-1)">‹</button>
    <button class="lb-arr" id="lbNext" onclick="lbNav(1)">›</button>

    <!-- fab -->
    <div class="lb-fab" id="lbFab">
      <button class="lf sel" id="lbSelBtn" onclick="lbSel()">☆ <span>Pilih</span></button>
      <button class="lf wa" onclick="lbWA()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        <span>WA</span>
      </button>
      <button class="lf dl" onclick="lbDl()">⬇ <span>Download</span></button>
    </div>

    <div class="zbadge" id="zbadge">100%</div>
  </div>

  <!-- strip -->
  <div class="lb-strip-wrap">
    <div class="lb-strip" id="lbStrip"></div>
  </div>
</div>

<script src="config.js"></script>
<script>
/* ═══════════════════════════════
   STATE
═══════════════════════════════ */
const QS      = new URLSearchParams(location.search);
const PROJ_ID = QS.get("id") || "";

let project      = null;
let folderStack  = [];
let curItems     = [];
let mediaItems   = [];   // images + videos only (for lightbox)
let selected     = new Set();

// lightbox
let LB = {
  idx: 0, open: false,
  zoom: 1, px: 0, py: 0,
  dragging: false, dx0: 0, dy0: 0, px0: 0, py0: 0,
  lastTap: 0, pinchDist: 0,
  fabTimer: null, hdrTimer: null, zoomTimer: null
};

/* ═══════════════════════════════
   INIT
═══════════════════════════════ */
async function init() {
  if (!PROJ_ID) return showErr("ID project tidak ditemukan di URL.");
  try {
    project = await api("getPreviewProject", { id: PROJ_ID });
    document.title = project.project + " — KFG Preview";
    document.getElementById("navProject").textContent = project.project;
    folderStack = [{ id: project.folderId, name: project.project }];
    renderBC();
    await loadFolder(project.folderId);
  } catch(e) { showErr(e.message); }
}

/* ═══════════════════════════════
   LOAD FOLDER
═══════════════════════════════ */
async function loadFolder(fid) {
  const g = document.getElementById("grid");
  g.innerHTML = `<div class="screen"><div class="spinner"></div></div>`;
  try {
    curItems   = await api("getFolderContents", { folderId: fid });
    mediaItems = curItems.filter(i => i.category === "image" || i.category === "video");
    renderGrid();
    renderStrip();
    updateCount();
  } catch(e) {
    g.innerHTML = `<div class="screen"><div style="font-size:40px">❌</div><div style="color:var(--soft)">${esc(e.message)}</div></div>`;
  }
}

/* ═══════════════════════════════
   GRID
═══════════════════════════════ */
function renderGrid() {
  const g = document.getElementById("grid");
  g.innerHTML = "";

  if (!curItems.length) {
    g.innerHTML = `<div class="screen"><div style="font-size:42px">📂</div><div style="color:var(--soft)">Folder kosong</div></div>`;
    return;
  }

  curItems.forEach((item, idx) => {
    const el = document.createElement("div");
    el.className = "gi";
    el.style.animationDelay = Math.min(idx * 0.025, 0.5) + "s";

    if (item.category === "folder") {
      el.classList.add("folder");
      el.innerHTML = `<div class="fi">📁</div><div class="fn">${esc(item.name)}</div>`;
      el.onclick = () => enterFolder(item);
      g.appendChild(el);
      return;
    }

    const mIdx    = mediaItems.findIndex(m => m.id === item.id);
    const isSel   = selected.has(item.id);
    const isImg   = item.category === "image";

    el.innerHTML = `
      <img src="${item.url}" loading="lazy" alt="${esc(item.name)}"
           onerror="this.parentNode.style.background='var(--s3)'">
      ${item.category === "video" ? `<div class="play-badge"><svg viewBox="0 0 48 48"><circle cx="24" cy="24" r="22" fill="rgba(0,0,0,.55)"/><polygon points="19,14 36,24 19,34" fill="white"/></svg></div>` : ""}
      <div class="gi-tick">${isSel ? "✓" : ""}</div>
      <div class="gi-ov">
        <div class="gi-ov-btns">
          ${isImg ? `<button class="ob ${isSel?"on":""}" data-act="sel" title="Pilih">${isSel?"✓":"☆"}</button>` : ""}
          <button class="ob" data-act="dl" title="Download">⬇</button>
          <button class="ob" data-act="wa" title="WA">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
          </button>
        </div>
        <div class="gi-nm">${esc(item.name)}</div>
      </div>
    `;

    if (isSel) el.classList.add("sel");
    el.querySelector(".gi-tick").textContent = isSel ? "✓" : "";

    // button events
    el.querySelectorAll(".ob").forEach(btn => {
      btn.onclick = (e) => {
        e.stopPropagation();
        const act = btn.dataset.act;
        if (act === "sel") { toggleSel(item); }
        if (act === "dl")  { startDl(item.downloadUrl, item.name); }
        if (act === "wa")  { singleWA(item); }
      };
    });

    // click = open lightbox
    el.onclick = () => { if (mIdx >= 0) lbOpen(mIdx); };
    g.appendChild(el);
  });
}

/* ═══════════════════════════════
   FOLDER NAV
═══════════════════════════════ */
function enterFolder(item) {
  folderStack.push({ id: item.id, name: item.name });
  renderBC();
  loadFolder(item.id);
}

function navBC(i) {
  if (i >= folderStack.length - 1) return;
  folderStack = folderStack.slice(0, i + 1);
  renderBC();
  loadFolder(folderStack.at(-1).id);
}

function renderBC() {
  const bc = document.getElementById("breadcrumb");
  bc.innerHTML = folderStack.map((f, i) => {
    const last = i === folderStack.length - 1;
    return `${i ? '<span class="bc-sep">›</span>' : ''}
      <div class="bc-item ${last ? "active" : ""}" onclick="navBC(${i})">
        ${i === 0 ? "🏠 " : "📁 "}${esc(f.name)}
      </div>`;
  }).join("");
  bc.scrollLeft = 9999;
}

/* ═══════════════════════════════
   SELECTION
═══════════════════════════════ */
function toggleSel(item) {
  if (selected.has(item.id)) selected.delete(item.id);
  else selected.add(item.id);
  updateSelUI();
  renderGrid();
}

function clearSel() {
  selected.clear();
  updateSelUI();
  renderGrid();
}

function updateSelUI() {
  const n   = selected.size;
  const sp  = document.getElementById("selPill");
  const bar = document.getElementById("bb");
  const dbs = document.getElementById("dlSelBtn");
  sp.textContent = n + " dipilih";
  sp.classList.toggle("show", n > 0);
  bar.classList.toggle("open", n > 0);
  document.getElementById("bbN").textContent = n;
  dbs.style.display = n > 0 ? "" : "none";
}

function updateCount() {
  const fol = curItems.filter(i => i.category === "folder").length;
  const med = curItems.filter(i => i.category !== "folder").length;
  let t = "";
  if (fol) t += `📁 ${fol} folder`;
  if (med) t += (fol ? "  ·  " : "") + `🖼️ ${med} file`;
  document.getElementById("itemCount").textContent = t;
}

/* ═══════════════════════════════
   DOWNLOAD
═══════════════════════════════ */
function startDl(url, name) {
  toast("⬇️ Mengunduh " + name);
  trigDl(url, name);
}

function trigDl(url, name) {
  const a = document.createElement("a");
  a.href = url; a.download = name; a.target = "_blank";
  document.body.appendChild(a); a.click(); a.remove();
}

async function downloadSelected() {
  const items = curItems.filter(i => selected.has(i.id));
  if (!items.length) return toast("Belum ada yang dipilih");
  await batchDl(items);
}

async function downloadAll() {
  const items = curItems.filter(i => i.category !== "folder");
  if (!items.length) return toast("Tidak ada file");
  if (items.length > 30) return toast("⚠️ Terlalu banyak. Pilih dulu lalu download pilihan.");
  await batchDl(items);
}

async function batchDl(items) {
  const ov  = document.getElementById("dlOv");
  const bar = document.getElementById("dlBar");
  const inf = document.getElementById("dlInf");
  ov.classList.add("open");
  for (let i = 0; i < items.length; i++) {
    inf.textContent  = `${i+1} / ${items.length}`;
    bar.style.width  = ((i+1)/items.length*100) + "%";
    trigDl(items[i].downloadUrl, items[i].name);
    await sleep(800);
  }
  ov.classList.remove("open");
  toast(`✅ ${items.length} file selesai`);
}

/* ═══════════════════════════════
   WHATSAPP
═══════════════════════════════ */
function shareWA() {
  const names = curItems.filter(i => selected.has(i.id)).map(i => i.name).join(", ");
  const msg   = `Halo, ini pilihan foto saya dari album *${project?.project || ""}*:\n\n${names}`;
  window.open("https://wa.me/?text=" + encodeURIComponent(msg), "_blank");
}

function singleWA(item) {
  const msg = `📁 *${item.name}*\n\nLink Drive: https://drive.google.com/file/d/${item.id}/view\n\nDari album: *${project?.project || ""}*`;
  window.open("https://wa.me/?text=" + encodeURIComponent(msg), "_blank");
}

/* ═══════════════════════════════
   LIGHTBOX OPEN / CLOSE
═══════════════════════════════ */
function lbOpen(idx) {
  LB.idx = Math.max(0, Math.min(idx, mediaItems.length - 1));
  LB.zoom = 1; LB.px = 0; LB.py = 0; LB.open = true;
  document.getElementById("lb").classList.add("open");
  document.body.style.overflow = "hidden";
  lbRender();
  lbScrollThumb(LB.idx);
  lbShowUI();
}

function lbClose() {
  LB.open = false;
  document.getElementById("lb").classList.remove("open");
  document.getElementById("lbCanvas").innerHTML = "";
  document.body.style.overflow = "";
}

function lbNav(d) {
  LB.idx  = (LB.idx + d + mediaItems.length) % mediaItems.length;
  LB.zoom = 1; LB.px = 0; LB.py = 0;
  lbRender();
  lbScrollThumb(LB.idx);
  lbShowUI();
}

/* ═══════════════════════════════
   LIGHTBOX RENDER
═══════════════════════════════ */
function lbRender() {
  const item   = mediaItems[LB.idx];
  const canvas = document.getElementById("lbCanvas");

  document.getElementById("lbName").textContent = item.name;
  document.getElementById("lbSub").textContent  = `${LB.idx+1} / ${mediaItems.length}`;

  // strip highlight
  document.querySelectorAll(".lt").forEach((t, i) => t.classList.toggle("a", i === LB.idx));

  // show/hide arrows
  const show = mediaItems.length > 1;
  document.getElementById("lbPrev").style.display = show ? "" : "none";
  document.getElementById("lbNext").style.display = show ? "" : "none";

  // sel button
  const sb  = document.getElementById("lbSelBtn");
  const on  = selected.has(item.id);
  if (item.category === "image") {
    sb.style.display = "";
    sb.classList.toggle("on", on);
    sb.innerHTML = (on ? "✓ " : "☆ ") + `<span>${on ? "Dipilih" : "Pilih"}</span>`;
  } else {
    sb.style.display = "none";
  }

  // content
  canvas.innerHTML = "";
  lbApply();

  if (item.category === "video") {
    const fr = document.createElement("iframe");
    fr.src   = item.fullUrl;
    fr.className = ""; fr.style.cssText = "width:min(900px,100vw - 0px);aspect-ratio:16/9;border:none;border-radius:8px;display:block";
    fr.setAttribute("allowfullscreen", "");
    fr.setAttribute("allow", "autoplay");
    canvas.appendChild(fr);
    return;
  }

  // image
  const spin = document.createElement("div");
  spin.className = "spinner"; spin.style.cssText = "position:absolute";
  canvas.appendChild(spin);

  const img = new Image();
  img.src = item.fullUrl;
  img.style.cssText = "max-width:100%;max-height:100%;object-fit:contain;user-select:none;pointer-events:none;display:block;border-radius:3px";
  img.draggable = false;
  img.onload  = () => { spin.remove(); canvas.appendChild(img); };
  img.onerror = () => { spin.innerHTML = '<span style="color:var(--muted)">Gagal memuat</span>'; };
}

function lbApply() {
  const c = document.getElementById("lbCanvas");
  c.style.transform = `translate(${LB.px}px,${LB.py}px) scale(${LB.zoom})`;
}

/* ═══════════════════════════════
   ZOOM
═══════════════════════════════ */
function lbZoom(z, cx, cy) {
  const main = document.getElementById("lbMain");
  const prev = LB.zoom;
  LB.zoom    = Math.max(1, Math.min(8, z));
  if (LB.zoom !== prev && cx !== undefined) {
    LB.px = (LB.px - cx) * (LB.zoom / prev) + cx;
    LB.py = (LB.py - cy) * (LB.zoom / prev) + cy;
  }
  if (LB.zoom === 1) { LB.px = 0; LB.py = 0; }
  lbApply();
  // badge
  const b = document.getElementById("zbadge");
  b.textContent = Math.round(LB.zoom * 100) + "%";
  b.classList.add("show");
  clearTimeout(LB.zoomTimer);
  LB.zoomTimer = setTimeout(() => b.classList.remove("show"), 1100);
}

/* ═══════════════════════════════
   FAB + HEADER SHOW/HIDE
═══════════════════════════════ */
function lbShowUI() {
  document.getElementById("lbFab").classList.add("vis");
  document.getElementById("lbH").classList.remove("hide");
  clearTimeout(LB.fabTimer); clearTimeout(LB.hdrTimer);
  const touch = navigator.maxTouchPoints > 0;
  if (!touch) {
    LB.fabTimer = setTimeout(() => document.getElementById("lbFab").classList.remove("vis"), 2200);
    LB.hdrTimer = setTimeout(() => document.getElementById("lbH").classList.add("hide"), 2200);
  }
}

/* ═══════════════════════════════
   LIGHTBOX THUMBNAIL STRIP
═══════════════════════════════ */
function renderStrip() {
  const s = document.getElementById("lbStrip");
  s.innerHTML = mediaItems.map((item, i) => {
    if (item.category === "video") return `<div class="lt vt ${i===LB.idx?"a":""}" onclick="lbGoTo(${i})">🎬</div>`;
    return `<div class="lt ${i===LB.idx?"a":""}" onclick="lbGoTo(${i})"><img src="${item.url}" loading="lazy"></div>`;
  }).join("");
}

function lbGoTo(i) {
  LB.idx = i; LB.zoom = 1; LB.px = 0; LB.py = 0;
  lbRender(); lbScrollThumb(i); lbShowUI();
}

function lbScrollThumb(i) {
  const thumbs = document.querySelectorAll(".lt");
  thumbs[i]?.scrollIntoView({ behavior:"smooth", block:"nearest", inline:"center" });
}

/* ═══════════════════════════════
   LIGHTBOX ACTIONS
═══════════════════════════════ */
function lbSel() {
  const item = mediaItems[LB.idx];
  if (!item || item.category !== "image") return;
  if (selected.has(item.id)) selected.delete(item.id); else selected.add(item.id);
  updateSelUI();
  lbRender();
  renderGrid();
}

function lbDl() {
  const item = mediaItems[LB.idx];
  if (!item) return;
  toast("⬇️ Mengunduh...");
  trigDl(item.downloadUrl, item.name);
}

function lbDrive() {
  const item = mediaItems[LB.idx];
  if (!item) return;
  window.open(`https://drive.google.com/file/d/${item.id}/view`, "_blank");
}

function lbWA() {
  const item = mediaItems[LB.idx];
  if (!item) return;
  singleWA(item);
}

/* ═══════════════════════════════
   LIGHTBOX TOUCH + MOUSE EVENTS
═══════════════════════════════ */
function setupLbEvents() {
  const main = document.getElementById("lbMain");

  /* ── click backdrop = close ── */
  main.addEventListener("click", (e) => {
    if (e.target === main) lbClose();
    else lbShowUI();
  });

  /* ── mouse drag ── */
  main.addEventListener("mousedown", (e) => {
    if (LB.zoom <= 1) return;
    LB.dragging = true;
    LB.dx0 = e.clientX; LB.dy0 = e.clientY;
    LB.px0 = LB.px;     LB.py0 = LB.py;
    e.preventDefault();
  });
  window.addEventListener("mousemove", (e) => {
    if (!LB.dragging) return;
    LB.px = LB.px0 + (e.clientX - LB.dx0);
    LB.py = LB.py0 + (e.clientY - LB.dy0);
    lbApply();
  });
  window.addEventListener("mouseup", () => { LB.dragging = false; });

  /* ── mouse wheel zoom ── */
  main.addEventListener("wheel", (e) => {
    e.preventDefault();
    const r  = main.getBoundingClientRect();
    lbZoom(LB.zoom * (e.deltaY < 0 ? 1.12 : 0.89),
           e.clientX - r.left - r.width/2,
           e.clientY - r.top  - r.height/2);
  }, { passive: false });

  /* ── touch ── */
  let swipeX0 = 0, swipeBlocked = false;

  main.addEventListener("touchstart", (e) => {
    if (e.touches.length === 2) {
      e.preventDefault();
      LB.pinchDist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY);
      swipeBlocked = true;
    } else {
      const now = Date.now();
      if (now - LB.lastTap < 260) {
        e.preventDefault();
        const r  = main.getBoundingClientRect();
        lbZoom(LB.zoom > 1 ? 1 : 2.5,
               e.touches[0].clientX - r.left - r.width/2,
               e.touches[0].clientY - r.top  - r.height/2);
      }
      LB.lastTap = now;
      swipeX0 = e.touches[0].clientX;
      LB.dx0  = e.touches[0].clientX;
      LB.dy0  = e.touches[0].clientY;
      LB.px0  = LB.px; LB.py0 = LB.py;
      swipeBlocked = false;
    }
  }, { passive: false });

  main.addEventListener("touchmove", (e) => {
    if (e.touches.length === 2) {
      e.preventDefault();
      const d   = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      const r   = main.getBoundingClientRect();
      const mx  = (e.touches[0].clientX + e.touches[1].clientX)/2 - r.left - r.width/2;
      const my  = (e.touches[0].clientY + e.touches[1].clientY)/2 - r.top  - r.height/2;
      lbZoom(LB.zoom * (d / LB.pinchDist), mx, my);
      LB.pinchDist = d;
      swipeBlocked = true;
    } else if (e.touches.length === 1 && LB.zoom > 1) {
      e.preventDefault();
      LB.px = LB.px0 + (e.touches[0].clientX - LB.dx0);
      LB.py = LB.py0 + (e.touches[0].clientY - LB.dy0);
      lbApply();
      swipeBlocked = true;
    }
  }, { passive: false });

  main.addEventListener("touchend", (e) => {
    if (swipeBlocked || LB.zoom > 1) return;
    const dx = e.changedTouches[0].clientX - swipeX0;
    if (Math.abs(dx) > 55) lbNav(dx < 0 ? 1 : -1);
  }, { passive: true });

  /* ── keyboard ── */
  document.addEventListener("keydown", (e) => {
    if (!LB.open) return;
    if (e.key === "ArrowLeft")  lbNav(-1);
    if (e.key === "ArrowRight") lbNav(1);
    if (e.key === "Escape")     lbClose();
  });

  /* ── mouse move = show FAB ── */
  main.addEventListener("mousemove", lbShowUI);
}

/* ═══════════════════════════════
   UTILS
═══════════════════════════════ */
function showErr(msg) {
  document.getElementById("grid").innerHTML =
    `<div class="screen"><div style="font-size:40px">😕</div><div style="font-size:14px;color:var(--soft)">${esc(msg)}</div></div>`;
}

function toast(msg) {
  const w = document.getElementById("toastWrap");
  const t = document.createElement("div");
  t.className = "toast"; t.textContent = msg;
  w.appendChild(t); setTimeout(() => t.remove(), 3000);
}

function esc(s) {
  return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function api(action, params = {}) {
  const qs   = new URLSearchParams({ action, ...params });
  const res  = await fetch(API_URL + "?" + qs);
  const json = await res.json();
  if (!json.success) throw new Error(json.error || "API error");
  return json.data;
}

/* ── START ── */
setupLbEvents();
init();
</script>
